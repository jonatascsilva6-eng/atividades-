<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Desconto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        #resultado {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Calculadora de Desconto 💰</h1>

    <input type="number" id="valor" placeholder="Digite o valor da compra">
    <br>
    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>

    <script>
        function calcular() {
            let valor = parseFloat(document.getElementById("valor").value);
            let desconto = 0;

            if (isNaN(valor) || valor < 0) {
                alert("Digite um valor válido.");
                return;
            }

            if (valor <= 100) {
                desconto = 0;
            } else if (valor <= 500) {
                desconto = 0.10;
            } else {
                desconto = 0.20;
            }

            let valorDesconto = valor * desconto;
            let valorFinal = valor - valorDesconto;

            document.getElementById("resultado").innerHTML = `
                Valor original: R$ ${valor.toFixed(2)} <br>
                Desconto: ${desconto * 100}% <br>
                Valor do desconto: R$ ${valorDesconto.toFixed(2)} <br>
                <strong>Valor final: R$ ${valorFinal.toFixed(2)}</strong>
            `;
        }
    </script>

</body>
</html>
